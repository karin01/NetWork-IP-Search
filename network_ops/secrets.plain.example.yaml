# 예시: 이 파일을 복사해 secrets.plain.yaml 로 만든 뒤 값을 채우고,
#   python encrypt_secrets.py secrets.plain.yaml secrets.enc
# 로 암호화하세요. secrets.plain.yaml·secrets.enc 는 Git에 올리지 마세요.

# 이전 백업과 running-config 가 다르면 메일·텔레그램 알림(설정된 채널만 전송)
notify_on_config_change: true

# devices.csv 의 pw 를 비워 둔 장비 IP 에 대응하는 SSH 비밀번호
device_passwords:
  "192.168.0.10": "여기_장비_SSH_비밀번호"
  "192.168.0.20": "여기_장비_SSH_비밀번호"

# 선택: 메일 (없으면 생략, 환경 변수로도 덮어쓰기 가능)
smtp:
  host: "smtp.example.com"
  port: 587
  user: "smtp_user"
  password: "smtp_앱비밀번호_또는_계정비밀번호"
  from_addr: "발신@example.com"
  to_addrs:
    - "수신@example.com"

# 선택: 텔레그램 BotFather 토큰 + chat_id
telegram:
  bot_token: "123456789:AA...봇토큰"
  chat_id: "채팅ID_숫자"
