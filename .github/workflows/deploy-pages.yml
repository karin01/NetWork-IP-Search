# GitHub Pages: 루트 = Portfolio 스타일 단독 랜딩(site-landing), /manual/ = VitePress 문서
# 저장소 Settings → Pages → Source: Deploy from a branch → gh-pages / (root)
name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-gh
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build VitePress (/manual/)
        working-directory: docs
        env:
          GITHUB_ACTIONS: "true"
        run: |
          npm install
          npm run docs:build

      - name: Assemble site (랜딩 + manual)
        run: |
          mkdir -p _site
          cp -r site-landing/. _site/
          mkdir -p _site/manual
          cp -r docs/.vitepress/dist/. _site/manual/

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
