# GitHub Pages: VitePress 빌드 후 gh-pages 브랜치에 푸시
# 저장소 Settings → Pages → Source: Deploy from a branch → gh-pages / (root)
# (upload-pages-artifact 방식은 Pages 소스를 "GitHub Actions"로 바꿔야 해서 404가 자주 남)
name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-gh
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build VitePress
        working-directory: docs
        env:
          GITHUB_ACTIONS: "true"
        run: |
          npm install
          npm run docs:build

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/.vitepress/dist
          force_orphan: true
